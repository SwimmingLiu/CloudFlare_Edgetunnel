name: Obfuscate VPN Backup

on:
  push:
    paths:
      - "vpnbak.js"
  workflow_dispatch:

concurrency:
  group: edgetunnel-worker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install -g multimatch@4.0.0 javascript-obfuscator

      - name: Obfuscate code
        run: |
          mkdir -p pages
          javascript-obfuscator vpnbak.js --output pages/vpnbak_worker.js \
          --compact true \
          --control-flow-flattening true \
          --control-flow-flattening-threshold 1 \
          --dead-code-injection true \
          --dead-code-injection-threshold 1 \
          --identifier-names-generator hexadecimal \
          --rename-globals true \
          --string-array true \
          --string-array-encoding 'rc4' \
          --string-array-threshold 1 \
          --transform-object-keys true \
          --unicode-escape-sequence true
          cp pages/vpnbak_worker.js pages/_worker.js
          rm -f pages/vpnbak_worker.zip
          zip -q -j pages/vpnbak_worker.zip pages/_worker.js

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add pages/vpnbak_worker.js pages/_worker.js pages/vpnbak_worker.zip
          git commit -m "Obfuscate vpnbak_worker.js" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
